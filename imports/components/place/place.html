<div class="row">
  <div class="col-md-6">
    <form>
      <div class="form-group">
        <label for="address" class="sr-only">Address</label>
        <input type="text" class="form-control" id="address" name='name' placeholder="Address" autocomplete="off">
      </div>
      <div class="row">
        <div class="col-xs-6">
          <div class="form-group">
            <label for="city" class="sr-only">City</label>
            <input type="text" class="form-control" id="city" name='sublocality' placeholder="City" autocomplete="off">
          </div>
        </div>
        <div class="col-xs-3">
          <div class="form-group">
            <label for="state" class="sr-only">State</label>
            <input type="text" class="form-control" id="state" name="administrative_area_level_1_short" placeholder="State" autocomplete="off">
          </div>
        </div>
        <div class="col-xs-3">
          <div class="form-group">

            <input type="text" class="form-control" id="postal_code" name="postal_code" placeholder="ZIP" autocomplete="off">

        </div>
      </div>

    </form>
  </div>
  <div class="col-md-6">
